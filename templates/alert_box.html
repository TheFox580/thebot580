            function deleteFile(file_name) {
                $.ajax({
                    url: "{{ url_for('static', filename='delete.php') }}", //ngl idk if it works
                    data: {
                        file:
                            "<?php echo dirname(__FILE__) . '/uploads/'?>" +
                            file_name,
                    },
                    success: function (response) {
                        console.log("File was sucessfully deleted.");
                    },
                    error: function () {
                        console.log("The file could not be deleted.");
                    },
                });
            }

            document.addEventListener("DOMContentLoaded", async () => {

                const alert_queue = [];
                const emoteSize = 36;

                let isAlertPlaying = false;

                const alert_box_text =
                    document.getElementById("alert_box_text");

                const alert_box_chat_message = document.getElementById(
                    "alert_box_chat_message",
                );

                const alert_box_img = document.getElementById("alert_box_img");

                function resetAlert() {
                    alert_box_img.src = "";
                    alert_box_text.textContent = "";
                    alert_box_chat_message.textContent = "";
                }

                function triggerAlert() {
                    isAlertPlaying = true;
                    const alert = alert_queue.shift();

                    console.log("Now playing: " + alert.type);
                    console.log(alert);

                    alert_box_img.src = alertImage[alert.type];

                    const user = document.createElement("span");
                    user.textContent = alert.username;
                    user.style.color = alert.color;

                    if (alert.type === "follow") {
                        alert_box_text.appendChild(
                            document.createTextNode("Thank you "),
                        );

                        alert_box_text.appendChild(user);

                        alert_box_text.appendChild(
                            document.createTextNode(" for the follow!"),
                        );
                    } else if (alert.type === "first_sub") {
                        alert_box_text.appendChild(
                            document.createTextNode("Thank you "),
                        );

                        alert_box_text.appendChild(user);

                        alert_box_text.appendChild(
                            document.createTextNode(" for the "),
                        );

                        const sub_type = document.createElement("span");
                        sub_type.textContent = "Tier " + alert.sub_type;
                        sub_type.style.color = alert.color;

                        alert_box_text.appendChild(sub_type);

                        alert_box_text.appendChild(
                            document.createTextNode(" sub!"),
                        );

                        alert_box_text.appendChild(sub_type);
                    } else if (alert.type === "resub_not_year") {
                        alert_box_text.appendChild(
                            document.createTextNode("Thank you "),
                        );

                        alert_box_text.appendChild(user);

                        alert_box_text.appendChild(
                            document.createTextNode(" for the "),
                        );

                        const sub_month = document.createElement("span");
                        sub_month.textContent = alert.amount;
                        sub_month.style.color = alert.color;

                        alert_box_text.appendChild(sub_month);

                        alert_box_text.appendChild(
                            document.createTextNode(
                                ` month${alert.amount > 1 ? "s" : ""} of `,
                            ),
                        );

                        const sub_type = document.createElement("span");
                        sub_type.textContent = "Tier " + alert.sub_type;
                        sub_type.style.color = alert.color;

                        alert_box_text.appendChild(sub_type);

                        alert_box_text.appendChild(
                            document.createTextNode(" sub!"),
                        );
                    } else if (alert.type === "resub_year") {
                        alert_box_text.appendChild(
                            document.createTextNode("Thank you "),
                        );

                        alert_box_text.appendChild(user);

                        alert_box_text.appendChild(
                            document.createTextNode(" for the "),
                        );

                        const sub_month = document.createElement("span");
                        sub_month.textContent = alert.amount;
                        sub_month.style.color = alert.color;

                        alert_box_text.appendChild(sub_month);

                        alert_box_text.appendChild(
                            document.createTextNode(
                                ` year${alert.amount > 1 ? "s" : ""} of`,
                            ),
                        );

                        const sub_type = document.createElement("span");
                        sub_type.textContent = "Tier " + alert.sub_type;
                        sub_type.style.color = alert.color;

                        alert_box_text.appendChild(sub_type);

                        alert_box_text.appendChild(
                            document.createTextNode(" sub!"),
                        );
                    } else if (alert.type === "gift_sub") {
                        alert_box_text.appendChild(
                            document.createTextNode("Thank you "),
                        );

                        alert_box_text.appendChild(user);

                        alert_box_text.appendChild(
                            document.createTextNode(" for the "),
                        );

                        const sub_amount = document.createElement("span");
                        sub_amount.textContent = alert.amount + " ";
                        sub_amount.style.color = alert.color;

                        alert_box_text.appendChild(sub_amount);

                        const sub_type = document.createElement("span");
                        sub_type.textContent = "Tier " + alert.sub_type;
                        sub_type.style.color = alert.color;

                        alert_box_text.appendChild(sub_type);

                        alert_box_text.appendChild(
                            document.createTextNode(
                                ` sub-gift${alert.amount > 1 ? "s" : ""}!`,
                            ),
                        );
                    } else if (alert.type === "cheer") {
                        alert_box_text.appendChild(
                            document.createTextNode("Thank you "),
                        );

                        alert_box_text.appendChild(user);

                        alert_box_text.appendChild(
                            document.createTextNode(" for the "),
                        );

                        const cheer_amount = document.createElement("span");
                        cheer_amount.textContent = alert.amount;
                        cheer_amount.style.color = alert.color;

                        alert_box_text.appendChild(cheer_amount);

                        alert_box_text.appendChild(
                            document.createTextNode(" bits!"),
                        );
                    } else if (alert.type === "hype_train_start") {
                        alert_box_text.appendChild(
                            document.createTextNode("A "),
                        );

                        const hype_train_shared =
                            document.createElement("span");
                        hype_train_shared.textContent = alert.is_shared
                            ? "Shared "
                            : "";
                        hype_train_shared.style.color = "#00FF00";

                        alert_box_text.appendChild(hype_train_shared);

                        const hype_train_type = document.createElement("span");
                        hype_train_type.textContent =
                            alert.train_type === "treasure"
                                ? "Treasure "
                                : alert.train_type === "golden_kappa"
                                  ? "Golden Kappa "
                                  : alert.train_type === "mythic"
                                    ? "Mythic "
                                    : "";
                        hype_train_type.style.color =
                            alert.train_type === "treasure"
                                ? "#3946c3"
                                : alert.train_type === "golden_kappa" ||
                                    alert.train_type === "mythic"
                                  ? "gold"
                                  : "#00FF00";

                        alert_box_text.appendChild(hype_train_type);

                        alert_box_text.appendChild(
                            document.createTextNode(" Hype Train has started!"),
                        );
                    } else if (alert.type === "hype_train_level_up") {
                        alert_box_text.appendChild(
                            document.createTextNode("The "),
                        );

                        const hype_train_shared =
                            document.createElement("span");
                        hype_train_shared.textContent = alert.is_shared
                            ? "Shared "
                            : "";
                        hype_train_shared.style.color = "#00FF00";

                        alert_box_text.appendChild(hype_train_shared);

                        const hype_train_type = document.createElement("span");
                        hype_train_type.textContent =
                            alert.train_type === "treasure"
                                ? "Treasure "
                                : alert.train_type === "golden_kappa"
                                  ? "Golden Kappa "
                                  : alert.train_type === "mythic"
                                    ? "Mythic "
                                    : "";
                        hype_train_type.style.color =
                            alert.train_type === "treasure"
                                ? "#3946c3"
                                : alert.train_type === "golden_kappa" ||
                                    alert.train_type === "mythic"
                                  ? "gold"
                                  : "#00FF00";

                        alert_box_text.appendChild(hype_train_type);

                        alert_box_text.appendChild(
                            document.createTextNode(" Hype Train has reached "),
                        );

                        const hype_train_level = document.createElement("span");
                        hype_train_level.textContent = "level " + alert.level;
                        hype_train_level.style.color = "#00FF00";

                        alert_box_text.appendChild(hype_train_level);

                        alert_box_text.appendChild(
                            document.createTextNode("!"),
                        );
                    } else if (alert.type === "raid") {
                        alert_box_text.appendChild(
                            document.createTextNode("Thank you "),
                        );

                        alert_box_text.appendChild(user);

                        alert_box_text.appendChild(
                            document.createTextNode(" for the raid of "),
                        );

                        const viewers = document.createElement("span");
                        viewers.textContent = alert.viewers;
                        viewers.style.color = alert.color;

                        alert_box_text.appendChild(viewers);

                        alert_box_text.appendChild(
                            document.createTextNode(
                                ` viewer${alert.viewers > 1 ? "s" : ""}!`,
                            ),
                        );
                    } else if (alert.type === "channel_points") {
                        alert_box_text.appendChild(user);

                        alert_box_text.appendChild(
                            document.createTextNode(" redeemed "),
                        );

                        const channel_points_reward_title =
                            document.createElement("span");
                        channel_points_reward_title.textContent = alert.title;
                        channel_points_reward_title.style.color = alert.color;

                        alert_box_text.appendChild(channel_points_reward_title);
                    }

                    if (alert.message) {
                        /*
                          traitement de message avec emotes
                        */

                        const splitMessages = alert.message.split(" ");
                        const lastWord = ("" + alert.message)
                            .replace(/[\s-]+$/, "")
                            .split(/[\s-]/)
                            .pop();

                        for (const word of splitMessages) {
                            if (
                                alert.emotes &&
                                Object.keys(alert.emotes).includes(word)
                            ) {
                                const chatMessageFragment =
                                    document.createElement("img");
                                chatMessageFragment.src = alert.emotes[word];
                                chatMessageFragment.classList.add(
                                    "inline-grid",
                                    "mr-2",
                                    `h-[${emoteSize}px]`,
                                    "align-middle",
                                );
                                alert_box_chat_message.appendChild(
                                    chatMessageFragment,
                                );
                            } else {
                                alert_box_chat_message.appendChild(
                                    document.createTextNode(
                                        word + (lastWord === word ? "" : " "),
                                    ),
                                );
                            }
                        }
                    } else if (alert.type === "gift_sub") {
                        alert_box_chat_message.appendChild(
                            document.createTextNode("They gifted "),
                        );

                        const gift_total = document.createElement("span");
                        gift_total.textContent = alert.total_amount;
                        gift_total.style.color = alert.color;

                        alert_box_chat_message.appendChild(gift_total);

                        alert_box_chat_message.appendChild(
                            document.createTextNode(
                                " subs in total to the community!",
                            ),
                        );
                    } else if (alert.type === "raid") {
                        alert_box_chat_message.appendChild(
                            document.createTextNode("Welcome to the stream!"),
                        );
                    }

                    if (alert.tts_loc) {
                        const tts = new Audio(alert.tts_loc);
                        tts.play();

                        tts.addEventListener("ended", (event) => {
                            deleteFile(tts_loc);
                        });
                    }

                    let time_for_alerts = alert.tts_loc
                        ? new Audio(alert.tts_loc).duration
                        : 5; // Make the alert at least as long as the TTS message if there's one, otherwise 5s

                    time_for_alerts += alert_queue < 20 ? 2 : 0.5; // Add 2s if less than 20 alerts in the queue, 0.5s otherwise

                    setTimeout(() => {
                        resetAlert();
                        if (alert_queue.length > 0) {
                            setTimeout(
                                () => {
                                    triggerAlert();
                                },
                                (time_for_alerts / 2) * 1000,
                            ); //1s timeout in-between alerts if less than 20 alerts, 0.25s otherwise
                        } else {
                            isAlertPlaying = false;
                        }
                    }, time_for_alerts * 1000);
                }

                const socket = io();

                socket.on("message_send", (msg, cb) => {
                    console.log("Got data: " + msg.message);
                });

                socket.on("new_alert", async (msg, cb) => {
                    console.log("Got a new message: ");
                    console.log(msg);

                    alert_queue.push(msg);
                    console.log("Added " + alert.type + " to the queue.");

                    if (!isAlertPlaying) {
                        triggerAlert();
                    }
                });
            });
        </script>

    <body class="w-screen h-screen items-center justify-center">
        <div

            id="alert_box"
        >
            <img src="" id="alert_box_img" class="mb-3" />
            <span
                id="alert_box_text"
                class="text-3xl mb-2"
                style="-webkit-text-stroke: 2px black"
            ></span>
            <span
                id="alert_box_chat_message"
                class="text-2xl text-white"
                style="-webkit-text-stroke: 2px black"
